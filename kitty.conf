# ══════════════════════════════════════════
#  VAPORWAVE KITTY TERMINAL THEME
# ══════════════════════════════════════════

# ── Font ──────────────────────────────────
font_family          JetBrainsMono Nerd Font
bold_font            JetBrainsMono Nerd Font Bold
italic_font          JetBrainsMono Nerd Font Italic
bold_italic_font     JetBrainsMono Nerd Font Bold Italic
font_size            12.5
disable_ligatures    never
font_features        JetBrainsMonoNL-Regular +calt +liga

# ── Cursor ────────────────────────────────
cursor                  #ff2a6d
cursor_text_color       #0d0221
cursor_shape            block
cursor_blink_interval   0.5
cursor_stop_blinking_after 15.0

# ── Scrollback ────────────────────────────
scrollback_lines        10000

# ── Mouse ─────────────────────────────────
mouse_hide_wait         2.0
url_color               #05d9e8
url_style               curly
open_url_with           default
url_prefixes            file ftp ftps http https mailto news
detect_urls             yes
copy_on_select          yes

# ── Window ────────────────────────────────
remember_window_size    yes
initial_window_width    110c
initial_window_height   30c
window_padding_width    14
window_margin_width     0
single_window_margin_width -1
placement_strategy      center
hide_window_decorations yes
confirm_os_window_close 0

# ── Tab bar ───────────────────────────────
tab_bar_edge            bottom
tab_bar_style           powerline
tab_powerline_style     slanted
tab_title_template      " {index}: {title[0:18]} "
active_tab_foreground   #05d9e8
active_tab_background   #1a0038
inactive_tab_foreground #8060a0
inactive_tab_background #0d0221
tab_bar_background      #0d0221
tab_bar_margin_color    none

# ── Color scheme ──────────────────────────
background              #0d0221
foreground              #e0d0ff
selection_background    #ff2a6d
selection_foreground    #0d0221

# Black
color0   #0d0221
color8   #3a1560

# Red
color1   #ff2a6d
color9   #ff5590

# Green
color2   #05d9e8
color10  #00ffdd

# Yellow
color3   #ffe66d
color11  #fff0a0

# Blue
color4   #7b2fff
color12  #a060ff

# Magenta
color5   #ff71ce
color13  #ffaaee

# Cyan
color6   #05d9e8
color14  #80f0ff

# White
color7   #c0b0ff
color15  #e0d0ff

# ── Background opacity / blur ─────────────
background_opacity          0.88
background_blur             24
dynamic_background_color    yes

# ── Advanced ──────────────────────────────
shell_integration           enabled
allow_remote_control        yes
listen_on                   unix:/tmp/mykitty
update_check_interval       0
clipboard_control           write-clipboard write-primary read-clipboard-ask read-primary-ask

# ── Key bindings ──────────────────────────
map ctrl+shift+c  copy_to_clipboard
map ctrl+shift+v  paste_from_clipboard
map ctrl+shift+t  new_tab_with_cwd
map ctrl+shift+w  close_tab
map ctrl+shift+]  next_tab
map ctrl+shift+[  previous_tab
map ctrl+equal    change_font_size all +1.0
map ctrl+minus    change_font_size all -1.0
map ctrl+0        change_font_size all 0
