general {
    disable_loading_bar = false
    hide_cursor         = true
    grace               = 0
    no_fade_in          = false
    no_fade_out         = false
    ignore_empty_input  = true
}

background {
    monitor     =
    path        = ~/.config/hypr/wallpaper/vaporwave.png
    blur_passes = 3
    blur_size   = 8
    brightness  = 0.6
    vibrancy    = 0.18
}

# Clock
label {
    monitor     =
    text        = cmd[update:1000] echo "$(date +"%H : %M")"
    font_family = JetBrainsMono Nerd Font
    font_size   = 88
    color       = rgba(5, 217, 232, 0.95)
    position    = 0, 200
    halign      = center
    valign      = center

    shadow_passes = 5
    shadow_size   = 10
    shadow_color  = rgba(255, 42, 109, 0.6)
    shadow_boost  = 1.5
}

# Date
label {
    monitor     =
    text        = cmd[update:60000] echo "$(date +"%A, %B %d")"
    font_family = JetBrainsMono Nerd Font
    font_size   = 22
    color       = rgba(255, 113, 206, 0.88)
    position    = 0, 120
    halign      = center
    valign      = center
}

# Input field
input-field {
    monitor         =
    size            = 320, 52
    outline_thickness = 2
    dots_size       = 0.25
    dots_spacing    = 0.18
    dots_center     = true
    outer_color     = rgba(255, 42, 109, 0.8)
    inner_color     = rgba(13, 2, 33, 0.75)
    font_color       = rgba(5, 217, 232, 1.0)
    fade_on_empty   = true
    fade_timeout    = 1200
    placeholder_text = <i>🔒  password…</i>
    hide_input      = false
    rounding        = 10
    check_color     = rgba(5, 217, 232, 0.9)
    fail_color      = rgba(255, 42, 109, 1.0)
    fail_text       = <i>✕  wrong password</i>
    fail_timeout    = 2200
    numlock_color   =
    bothlock_color  =
    invert_numlock  = false

    position        = 0, -120
    halign          = center
    valign          = center
}

# Hint
label {
    monitor     =
    text        = Press Enter to unlock
    font_family = JetBrainsMono Nerd Font
    font_size   = 13
    color       = rgba(123, 47, 255, 0.70)
    position    = 0, -180
    halign      = center
    valign      = center
}
