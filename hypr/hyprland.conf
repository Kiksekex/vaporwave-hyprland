####################################
#  VAPORWAVE HYPRLAND CONFIGURATION
#  Aesthetic: Synthwave / Vaporwave
####################################

# ── Monitors ──────────────────────────────────────────────────────────────────
# Adjust to your setup. Example: monitor=eDP-1,1920x1080@60,0x0,1
monitor=,preferred,auto,1

# ── Autostart ─────────────────────────────────────────────────────────────────
exec-once = hyprpaper
exec-once = waybar
exec-once = dunst
exec-once = hypridle
exec-once = /usr/lib/hyprpolkitagent/hyprpolkitagent
exec-once = wl-paste --type text  --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = nm-applet --indicator

# ── Environment ───────────────────────────────────────────────────────────────
env = XCURSOR_SIZE,24
env = XCURSOR_THEME,Bibata-Modern-Ice
env = QT_QPA_PLATFORMTHEME,qt5ct
env = GTK_THEME,Colloid-Dark-Pink

# ─────────────────────────────────────────────────────────────────────────────
#  GENERAL
# ─────────────────────────────────────────────────────────────────────────────
general {
    gaps_in             = 6
    gaps_out            = 14
    border_size         = 2
    col.active_border   = rgb(ff2a6d) rgb(05d9e8) rgb(7b2fff) 45deg
    col.inactive_border = rgb(1a0038) rgb(2a005a) 45deg
    layout              = dwindle
    resize_on_border    = true
    allow_tearing       = false
}

# ─────────────────────────────────────────────────────────────────────────────
#  DECORATION  (glassmorphism + neon glow)
# ─────────────────────────────────────────────────────────────────────────────
decoration {
    rounding           = 12
    active_opacity     = 0.96
    inactive_opacity   = 0.82
    fullscreen_opacity = 1.0

    blur {
        enabled          = true
        size             = 8
        passes           = 3
        noise            = 0.0117
        contrast         = 1.1
        brightness       = 0.85
        vibrancy         = 0.22
        vibrancy_darkness = 0.1
        special          = true
        popups           = true
    }

    shadow {
        enabled          = true
        range            = 30
        render_power     = 4
        color            = rgba(ff2a6d55)
        color_inactive   = rgba(7b2fff33)
        offset           = 0, 4
        scale            = 1.0
    }
}

# ─────────────────────────────────────────────────────────────────────────────
#  ANIMATIONS  (smooth synthwave vibes)
# ─────────────────────────────────────────────────────────────────────────────
animations {
    enabled = true

    # Custom Bezier curves
    bezier = neon,      0.05, 0.9,  0.1,  1.05   # snappy overshoot
    bezier = glide,     0.25, 1.0,  0.5,  1.0    # smooth glide
    bezier = synth,     0.68, -0.6, 0.32, 1.6    # synthwave bounce
    bezier = fadeIn,    0.0,  0.0,  0.2,  1.0    # ease-out
    bezier = fadeOut,   0.4,  0.0,  1.0,  1.0    # ease-in
    bezier = linear,    0.0,  0.0,  1.0,  1.0

    # Window open/close
    animation = windowsIn,   1, 6,  neon,   slide
    animation = windowsOut,  1, 5,  fadeOut, slide
    animation = windowsMove, 1, 5,  glide

    # Fade
    animation = fadeIn,      1, 5,  fadeIn
    animation = fadeOut,     1, 4,  fadeOut
    animation = fadeSwitch,  1, 5,  fadeIn
    animation = fadeShadow,  1, 5,  fadeIn
    animation = fadeLayers,  1, 5,  fadeIn
    animation = fadeLayersOut, 1, 4, fadeOut

    # Layers (waybar, rofi, etc.)
    animation = layers,      1, 4,  glide,  slide

    # Workspace switching – neon slide
    animation = workspaces,  1, 6,  synth,  slidevert
    animation = specialWorkspace, 1, 5, neon, slidevert
}

# ─────────────────────────────────────────────────────────────────────────────
#  LAYOUT
# ─────────────────────────────────────────────────────────────────────────────
dwindle {
    pseudotile         = true
    preserve_split     = true
    force_split        = 2
    smart_split        = false
    smart_resizing     = true
    use_active_for_splits = true
}

master {
    new_status         = master
    mfact              = 0.55
}

# ─────────────────────────────────────────────────────────────────────────────
#  INPUT
# ─────────────────────────────────────────────────────────────────────────────
input {
    kb_layout    = dk
    follow_mouse = 1
    sensitivity  = 0
    accel_profile = flat

    touchpad {
        natural_scroll   = true
        disable_while_typing = true
        tap-to-click     = true
        scroll_factor    = 0.8
    }
}

gestures {
#    workspace_swipe            = true
#    workspace_swipe_fingers    = 3
    workspace_swipe_distance   = 280
    workspace_swipe_invert     = true
    workspace_swipe_min_speed_to_force = 12
    workspace_swipe_cancel_ratio       = 0.4
    workspace_swipe_create_new = true
}

# ─────────────────────────────────────────────────────────────────────────────
#  MISCELLANEOUS
# ─────────────────────────────────────────────────────────────────────────────
misc {
    disable_hyprland_logo    = true
    disable_splash_rendering = true
    force_default_wallpaper  = 0
    mouse_move_enables_dpms  = true
    key_press_enables_dpms   = true
    vfr                      = true
    vrr                      = 0
    animate_manual_resizes   = true
    animate_mouse_windowdragging = true
    enable_swallow           = true
    swallow_regex            = ^(kitty|alacritty|wezterm)$
    focus_on_activate        = true
    initial_workspace_tracking = 1
}

# ─────────────────────────────────────────────────────────────────────────────
#  BINDS
# ─────────────────────────────────────────────────────────────────────────────
$mod = SUPER

# ── Applications ──────────────────────────────────────────────────────────────
bind = $mod,       A, exec, kitty
bind = $mod SHIFT, A, exec, kitty --class floating
bind = $mod,       E,      exec, thunar
bind = $mod,       B,      exec, firefox
bind = $mod,       Space,  exec, rofi -show drun -theme ~/.config/rofi/vaporwave.rasi
bind = $mod SHIFT, Space,  exec, rofi -show run  -theme ~/.config/rofi/vaporwave.rasi
bind = $mod,       V,      exec, cliphist list | rofi -dmenu -theme ~/.config/rofi/vaporwave.rasi | cliphist decode | wl-copy
bind = $mod,       period, exec, pkill rofi || rofi -show emoji -theme ~/.config/rofi/vaporwave.rasi

# ── Window management ──────────────────────────────────────────────────────────
bind = $mod,       Q,      killactive
bind = $mod SHIFT, Q,      exit
bind = $mod,       F,      fullscreen, 0
bind = $mod SHIFT, F,      fullscreen, 1
bind = $mod,       M,      fullscreen, 2
bind = $mod,       P,      pseudo
bind = $mod,       J,      togglesplit
bind = $mod,       T,      togglefloating

bind = $mod,       H,      movefocus, l
bind = $mod,       L,      movefocus, r
bind = $mod,       K,      movefocus, u
bind = $mod,       J,      movefocus, d

bind = $mod SHIFT, H,      movewindow, l
bind = $mod SHIFT, L,      movewindow, r
bind = $mod SHIFT, K,      movewindow, u
bind = $mod SHIFT, J,      movewindow, d

bind = $mod CTRL,  H,      resizeactive, -40 0
bind = $mod CTRL,  L,      resizeactive,  40 0
bind = $mod CTRL,  K,      resizeactive, 0 -40
bind = $mod CTRL,  J,      resizeactive, 0  40

# ── Workspaces ────────────────────────────────────────────────────────────────
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

bind = $mod,       Tab,   workspace,   e+1
bind = $mod SHIFT, Tab,   workspace,   e-1
bind = $mod,       mouse_down, workspace, e+1
bind = $mod,       mouse_up,   workspace, e-1

# ── Special workspace (scratchpad) ────────────────────────────────────────────
bind = $mod,       S, togglespecialworkspace, magic
bind = $mod SHIFT, S, movetoworkspace,        special:magic

# ── Media / Volume ────────────────────────────────────────────────────────────
bind = , XF86AudioMute,        exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.5 @DEFAULT_AUDIO_SINK@ 5%+
bind = , XF86AudioPlay,        exec, playerctl play-pause
bind = , XF86AudioNext,        exec, playerctl next
bind = , XF86AudioPrev,        exec, playerctl previous
bind = , XF86MonBrightnessUp,  exec, brightnessctl set 5%+
bind = , XF86MonBrightnessDown,exec, brightnessctl set 5%-

# ── Screenshots ───────────────────────────────────────────────────────────────
bind = ,      Print,       exec, hyprshot -m output -o ~/Pictures/Screenshots
bind = $mod,  Print,       exec, hyprshot -m window -o ~/Pictures/Screenshots
bind = $mod SHIFT, Print,  exec, hyprshot -m region -o ~/Pictures/Screenshots

# ── Mouse binds ───────────────────────────────────────────────────────────────
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# ── Reload ────────────────────────────────────────────────────────────────────
bind = $mod SHIFT, R, exec, hyprctl reload

# ─────────────────────────────────────────────────────────────────────────────
#  WINDOW RULES
# ─────────────────────────────────────────────────────────────────────────────
# Float rules
windowrule = float yes,  match:class ^(pavucontrol)$
windowrule = float yes,  match:class ^(nm-connection-editor)$
windowrule = float yes,  match:class ^(blueman-manager)$
windowrule = float yes,  match:class ^(thunar)$,         match:title ^(File Operation)
windowrule = float yes,  match:class ^(floating)$
windowrule = float yes,  match:title ^(Picture-in-Picture)$
windowrule = float yes,  match:title ^(Open File)$
windowrule = float yes,  match:title ^(Save File)$

# Sizes
windowrule = size 860 560, match:class ^(pavucontrol)$
windowrule = size 900 640, match:class ^(blueman-manager)$
windowrule = center on,       match:class ^(pavucontrol)$
windowrule = center on,       match:class ^(blueman-manager)$

# Opacity
windowrule = opacity 0.90 0.78, match:class ^(kitty)$
windowrule = opacity 0.95 0.88, match:class ^(thunar)$
windowrule = opacity 1.00 1.00, match:class ^(firefox)$

# Idle inhibit for media
windowrule = idle_inhibit focus, match:class ^(mpv)$
windowrule = idle_inhibit fullscreen, match:class ^(firefox)$

# ─────────────────────────────────────────────────────────────────────────────
#  LAYER RULES
# ─────────────────────────────────────────────────────────────────────────────
layerrule = blur on,         match:namespace waybar
layerrule = blur on,         match:namespace rofi
layerrule = blur on,         match:namespace notifications
#layerrule = order 1,     match:namespace waybar
#layerrule = order 1,     match:namespace rofi
#layerrule = order 1,     match:namespace notifications
layerrule = animation slide top, match:namespace waybar
layerrule = animation slide, match:namespace rofi
layerrule = animation fade, match:namespace notifications
